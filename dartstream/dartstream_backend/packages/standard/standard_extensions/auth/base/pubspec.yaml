name: ds_auth_base
description: Base package for DartStream authentication, including foundational classes and interfaces.
version: 0.0.1-pre
repository: https://github.com/aortem/dartstream

environment:
 sdk: ^3.8.2 

resolution: workspace

# Dependencies are added in sections alphabetically and according to features.
dependencies:
  ds_auth0_auth_provider: ^0.0.1-pre
  ds_firebase_auth_provider: ^0.0.1-pre+1
  ds_magic_auth_provider: ^0.0.1-pre
  ds_fingerprint_auth_provider: ^0.0.1-pre
  ds_transmit_auth_provider: ^0.0.2
#  Add or remove the supported Auth SDK providers as needed (ie. firebase_dart_admin_auth_sdk: ^latest)

