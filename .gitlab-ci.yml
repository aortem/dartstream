cypress_tests:
  stage: unit_testing
  trigger:
    include: tools/pipelines/qa-testing/backend/child-ci-qa-unit.yml
  rules:
    # Run only when backend has changed
    - changes:
        - dartcloudfunctions/backend/**/*
      when: always
    - when: never

cypress_tests:
  stage: integration_testing
  trigger:
    include: tools/pipelines/qa-testing/backend/child-ci-qa-integration.yml
  rules:
    # Run only when backend has changed
    - changes:
        - dartcloudfunctions/backend/**/*
      when: always
    - when: never

cypress_tests:
  stage: e2e_testing
  trigger:
    include: tools/pipelines/qa-testing/backend/child-ci-qa-e2e.yml
  rules:
    # Run only when backend has changed
    - changes:
        - dartcloudfunctions/backend/**/*
      when: always
    - when: never

